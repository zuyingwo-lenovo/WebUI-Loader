<script>
    // --- API Setting ---
    const API_BASE_URL = 'http://127.0.0.1:5151'; // Flask server address

    // --- Global Variables ---
    let pieChart;
    let restApiInterval = null;
    let currentSessionId = null; // Session ID from API
    let currentRole; // Role from API
    // [変更] プリセット役職を英語に変更
    const presetRoles = ['Manager', 'Developer', 'Sales'];

    // --- IndexedDB code removed ---

    // --- Demo Data ---

    // allLogData starts empty and is built from API data
    let allLogData = [];

    // [変更] デモデータを英語に変更
    // Seed data to add if API LogPool is empty
    const demoLogPoolSeed = [
        { role: 'Developer', author: 'Participant B', message: 'Mentioned "Potential delay"' },
        { role: 'Sales', author: 'Participant D', message: 'Shared "Customer feedback"' },
        { role: 'Developer', author: 'Participant C', message: 'Agreed on "Specification change"' },
        { role: 'Manager', author: 'Participant B', message: 'Requested "Additional resources"' }
    ];

    // [変更] デモサマリを英語に変更
    // This HTML will be fetched from Flask API /api/summaries/projectReview
    // If the API has a simple version, this HTML will overwrite it
    const demoSummaryContent = `
        <p>&lt;ISSUE&gt;</p>
        <p class="highlight">NDF</p>
        <p>accounts for almost half of FA samples.</p>
        <p>Among <span class="highlight-red">QDTS Case</span>, many are <span class="highlight-red">Customer managed</span> at <span class="highlight-red">CID</span>.</p>
        <p>As a result, customer has concerns about <span class="highlight">KBD</span> quality (incl. analysis capability).</p>
        <br>
        <p>&lt;COUNTERMEASURE&gt;</p>
        <p>Create <span class="highlight">Recreation guidance</span> and distribute to <span class="highlight">L2/COE/Supplier</span></p>
        <p>to improve reproducibility.</p>
        <p>Not only use <span class="highlight">Machine</span>, but also provide JIGs to make reproduction easier.</p>
        <p>Cooperate with <span class="highlight">HWPA</span> to improve test procedures.</p>
        <p>Streamline <span class="highlight">Flow</span> from <span class="highlight">Issue finding</span> at <span class="highlight">Customer</span> to FA at <span class="highlight">Dev.</span></p>
        <p>Clarify roles at each step. Be careful not to make <span class="highlight-red">TAT</span> too long.</p>
        <br>
        <p>&lt;ISSUE&gt;</p>
        <p>Cannot verify effect of <span class="highlight">EC</span> on actual machine because we don't know</p>
        <p>how to turn <span class="highlight-red">Good sample</span> into <span class="highlight-red">defect sample</span>.</p>
        <p>Therefore, risk of recurrence remains.</p>
    `;

    // (icons, colors are unchanged)
    const icons = {
        warning: `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>`,
        success: `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>`,
        info: `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`
    };
    const colors = {
        warning: { bg: 'bg-amber-500', text: 'text-amber-400' },
        success: { bg: 'bg-emerald-500', text: 'text-gray-200' },
        info: { bg: 'bg-blue-500', text: 'text-gray-200' }
    };

    // --- DOM Element Retrieval ---
    const logContainer = document.getElementById('logContainer');
    const roleMenuButton = document.getElementById('roleMenuButton');
    const roleMenu = document.getElementById('roleMenu');
    const logHeaderRole = document.getElementById('logHeaderRole');
    const roleOptions = document.querySelectorAll('.role-option');
    const saveButton = document.getElementById('saveButton');
    const startButton = document.getElementById('startButton');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const customRoleInput = document.getElementById('customRoleInput');
    const customRoleButton = document.getElementById('customRoleButton');
    const summaryButton = document.getElementById('summaryButton');
    const summaryModal = document.getElementById('summaryModal');
    const summaryCloseButton = document.getElementById('summaryCloseButton');
    const summaryRole = document.getElementById('summaryRole');
    const summaryContentContainer = document.getElementById('summaryContentContainer');


    // --- API Helper ---
    /**
     * Wrapper for sending fetch requests to the API
     * @param {string} endpoint - Path after /api/
     * @param {RequestInit} options - fetch options
     */
    async function apiFetch(endpoint, options = {}) {
        const url = `${API_BASE_URL}${endpoint}`;
        try {
            const response = await fetch(url, {
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers,
                },
                ...options,
            });
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API Error ${response.status}: ${errorText}`);
            }
            if (response.status === 204) {
                return null;
            }
            return await response.json();
        } catch (error) {
            console.error(`Fetch error for ${url}:`, error);
            // [変更] エラーメッセージを英語に変更
            logHeaderRole.textContent = "API Connection Error";
            throw error;
        }
    }


    // --- Application Initialization ---

    /**
     * Initialize database and session
     */
    async function initializeApp() {
        try {
            // 1. Create a new session
            const sessionData = await apiFetch('/api/sessions', { method: 'POST' });
            currentSessionId = sessionData.id;
            console.log(`New session created: ${currentSessionId}`);

            // 2. Load role setting from API
            const roleData = await apiFetch('/api/settings/currentRole');

            if (roleData && roleData.value) {
                if (typeof roleData.value === 'object' && roleData.value !== null && 'value' in roleData.value) {
                    currentRole = roleData.value.value;
                } else if (typeof roleData.value === 'string') {
                    currentRole = roleData.value;
                } else {
                    currentRole = presetRoles[0]; // Manager
                }
            } else {
                currentRole = presetRoles[0]; // Fallback
                console.warn('Could not fetch role, defaulting to Manager.');
                await setRole(currentRole);
            }
            logHeaderRole.textContent = currentRole;

            // 3. Check API summary data and overwrite if necessary
            await checkAndSeedSummary();

            // 4. Seed LogPool if empty
            await checkAndSeedLogPool();

            // 5. Initial render of the app UI
            renderLogs(currentRole); // allLogData is still empty
            initializeChart(); // Draw initial chart

        } catch (error) {
            console.error('Failed to initialize app:', error);
            // [変更] エラーメッセージを英語に変更
            logHeaderRole.textContent = "Init Failed";
        }
    }

    /**
     * Overwrite API summary data with rich HTML if it's the simple version
     */
    async function checkAndSeedSummary() {
        try {
            const summaryData = await apiFetch('/api/summaries/projectReview');
            // Check if it's the default simple HTML from Flask API
            if (summaryData.html.includes("<h3>Project Review (Demo)</h3>")) {
                console.log('Default summary found. Uploading rich HTML summary...');
                await apiFetch('/api/summaries/projectReview', {
                    method: 'PUT',
                    body: JSON.stringify({ html: demoSummaryContent })
                });
                console.log('Rich HTML summary uploaded.');
            } else {
                console.log('Rich summary already exists in API.');
            }
        } catch (error) {
            console.error('Failed to check/seed summary:', error);
        }
    }

    /**
     * Seed API LogPool with demo data if it's empty
     */
    async function checkAndSeedLogPool() {
        try {
            const poolData = await apiFetch('/api/logPool?limit=1');
            if (poolData && poolData.meta && poolData.meta.total === 0) {
                console.log('LogPool is empty. Seeding with demo data...');
                await apiFetch('/api/logPool', {
                    method: 'POST',
                    body: JSON.stringify({ logs: demoLogPoolSeed })
                });
                console.log('LogPool seeded successfully.');
            } else {
                console.log('LogPool already has data.');
            }
        } catch (error) {
            console.error('Failed to check/seed LogPool:', error);
        }
    }


    // --- Function Definitions ---

    /**
     * Set the role and update UI and API
     * @param {string} roleName - Role name to set
     */
    async function setRole(roleName) {
        if (!roleName || roleName.trim() === '') return;

        // 1. Update state
        currentRole = roleName;

        // 2. Save role setting to API
        try {
            await apiFetch('/api/settings/currentRole', {
                method: 'PUT',
                body: JSON.stringify({ value: currentRole })
            });
            console.log(`Saved role to API: ${currentRole}`);
        } catch (error) {
            console.error('Failed to save role to API:', error);
        }

        // 3. Update UI
        logHeaderRole.textContent = roleName;
        roleMenu.classList.add('hidden');
        renderLogs(currentRole);

        // 4. Clear input field
        if (customRoleInput) {
            customRoleInput.value = '';
        }
    }

    /**
     * Render logs
     * @param {string} role - Role to filter by
     */
    function renderLogs(role) {
        logContainer.innerHTML = '';
        const isPresetRole = presetRoles.includes(role);

        const filteredLogs = isPresetRole
            ? allLogData.filter(log => log.roles.includes(role))
            : allLogData;

        filteredLogs.forEach(log => {
            const color = colors[log.type] || colors.info;
            const iconSvg = icons[log.icon] || icons.info;

            const logEntry = `
                    <li class="flex items-start space-x-3">
                        <div class="flex-shrink-0 w-6 h-6 rounded-full ${color.bg} text-white flex items-center justify-center mt-0.5">
                            ${iconSvg}
                        </div>
                        <div class="flex-grow">
                            <p class="text-sm font-medium ${color.text}">${log.title}</p>
                            <p class="text-xs text-gray-400">${log.details}</p>
                        </div>
                        <span class="flex-shrink-0 text-xs text-gray-500">${log.time}</span>
                    </li>
                `;
            logContainer.insertAdjacentHTML('beforeend', logEntry);
        });

        logContainer.scrollTop = logContainer.scrollHeight;
    }

    /**
     * Update pie chart data
     */
    function updatePieChart() {
        if (!pieChart) return;

        // [変更] ラベルを英語に変更
        const counts = {
            'Action Item': allLogData.filter(l => l.type === 'info').length,
            'Concern/Q': allLogData.filter(l => l.type === 'warning').length,
            'Agreement': allLogData.filter(l => l.type === 'success').length,
            'Topic Change': allLogData.filter(l => !['info', 'warning', 'success'].includes(l.type)).length
        };

        pieChart.data.datasets[0].data = [
            counts['Action Item'],
            counts['Concern/Q'],
            counts['Agreement'],
            counts['Topic Change']
        ];

        pieChart.update();
    }

    /**
     * Simulate fetching data from RestAPI
     */
    async function fetchRestApiData() {
        let apiLog;
        try {
            // Hit Flask API /api/logPool/nextOldest
            const response = await apiFetch('/api/logPool/nextOldest');
            if (!response || !response.data) {
                console.warn("No log received from API.");
                return;
            }
            apiLog = response.data;
        } catch (error) {
            console.error("Failed to fetch from API, stopping simulation.", error);
            stopSimulation(); // Stop simulation on error
            return;
        }

        // [変更] ログ変換ロジックを英語基準に変更
        // Convert API data (Flask Model) to Dashboard format
        // Flask Model: { "role": "...", "message": "...", "author": "..." }
        // Dashboard:   { "type": "info", "title": "...", "details": "...", "roles": ["..."] }

        // Temporary logic: determine type and icon based on role
        let logType = 'info'; // 'Developer' (or other)
        if (apiLog.role === 'Manager') logType = 'warning';
        if (apiLog.role === 'Sales') logType = 'success';

        const newLog = {
            type: apiLog.type,
            icon: logType,
            title: apiLog.message, // message to title
            // [変更] '発言者:' -> 'Speaker: ', '(発言者不明)' -> '(Unknown Speaker)'
            details: apiLog.author ? `Speaker: ${apiLog.author}` : '(Unknown Speaker)', // author to details
            // [変更] ロケールを 'ja-JP' -> 'en-US'
            time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
            roles: [apiLog.role] // API role to dashboard roles array
        };

        allLogData.push(newLog);
        renderLogs(currentRole);
        updatePieChart(); // This updates the pie chart
    }


    // --- Chart.js ---

    /**
     * Initialize the chart
     */
    function initializeChart() {
        Chart.defaults.color = '#9CA3AF';
        Chart.defaults.font.family = 'Inter, sans-serif';

        const pieCtx = document.getElementById('intentPieChart').getContext('2d');
        pieChart = new Chart(pieCtx, {
            type: 'doughnut',
            data: {
                // [変更] ラベルを英語に変更
                labels: ['Action Item', 'Concern/Q', 'Agreement', 'Topic Change'],
                datasets: [{
                    data: [ 0, 0, 0, 0 ], // Initial data is 0
                    backgroundColor: [
                        '#3B82F6', // blue-500 (Action)
                        '#F59E0B', // amber-500 (Concern)
                        '#10B981', // emerald-500 (Agreement)
                        '#9333EA', // purple-600 (Other/Change)
                    ],
                    borderColor: '#1F2937',
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '60%',
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                        align: 'center',
                        labels: {
                            color: '#D1D5DB',
                            boxWidth: 10,
                            padding: 8,
                            font: {
                                size: 10
                            }
                        }
                    },
                    tooltip: {
                        backgroundColor: '#374151',
                        titleColor: '#FFFFFF',
                        bodyColor: '#FFFFFF',
                    }
                }
            }
        });
    }

    /**
     * Stop the simulation
     */
    function stopSimulation() {
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
        // [変更] titleを英語に変更
        startButton.title = "Start Detection";
        console.log('Detection stopped (RestAPI simulation).');
        clearInterval(restApiInterval);
        isRunning = false;
    }

    // --- Event Listeners ---

    // (Role menu, custom role unchanged)
    roleMenuButton.addEventListener('click', (e) => {
        e.stopPropagation();
        roleMenu.classList.toggle('hidden');
    });
    roleOptions.forEach(option => {
        option.addEventListener('click', (e) => {
            e.preventDefault();
            const selectedRole = e.target.dataset.role;
            setRole(selectedRole);
        });
    });
    customRoleButton.addEventListener('click', () => {
        const customRole = customRoleInput.value.trim();
        setRole(customRole);
    });
    customRoleInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const customRole = customRoleInput.value.trim();
            setRole(customRole);
        }
    });
    roleMenu.addEventListener('click', (e) => {
        e.stopPropagation();
    });

    // Save Button (API)
    saveButton.addEventListener('click', async () => {
        if (!currentSessionId) {
            console.error('Session ID not initialized. Cannot save logs.');
            return;
        }

        console.log(`Saving ${allLogData.length} logs for session ${currentSessionId} to API...`);

        try {
            // Convert dashboard format (allLogData) to API format (SavedLog)
            const logsToSave = allLogData.map(log => ({
                session_id: currentSessionId,
                role: log.type, // Save 'info', 'warning' etc. as role
                message: log.title,
                author: log.details, // Save 'Speaker: ...' etc. as author
                created_at: new Date().toISOString()
            }));

            // Hit /api/savedLogs/bulk
            await apiFetch('/api/savedLogs/bulk', {
                method: 'POST',
                body: JSON.stringify({ logs: logsToSave })
            });

            console.log('Logs saved successfully to API.');

            saveButton.classList.add('bg-blue-600');
            setTimeout(() => {
                saveButton.classList.remove('bg-blue-600');
            }, 500);

        } catch (error) {
            console.error('Failed to save logs to API:', error);
        }
    });

    // Start/Stop Button
    let isRunning = false;
    startButton.addEventListener('click', () => {
        if (!currentSessionId) {
            // [変更] alertを英語に変更
            alert('Session not initialized. Please reload the page.');
            return;
        }
        isRunning = !isRunning;
        if (isRunning) {
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
            // [変更] titleを英語に変更
            startButton.title = "Stop Detection";
            console.log('Detection started (RestAPI simulation).');
            restApiInterval = setInterval(fetchRestApiData, 2500);
        } else {
            stopSimulation();
        }
    });

    // (Click outside menu unchanged)
    document.addEventListener('click', (e) => {
        if (!roleMenuButton.contains(e.target)) {
            roleMenu.classList.add('hidden');
        }
    });

    // Summary Button Event Listener (API)
    summaryButton.addEventListener('click', async () => {
        try {
            // 1. Get role info from API
            const roleData = await apiFetch('/api/settings/currentRole');
            let role = 'N/A';
            if (roleData && roleData.value) {
                if (typeof roleData.value === 'object' && roleData.value !== null && 'value' in roleData.value) {
                    role = roleData.value.value;
                } else if (typeof roleData.value === 'string') {
                    role = roleData.value;
                }
            }

            // 2. Get summary info from API
            const summaryData = await apiFetch('/api/summaries/projectReview');
            // [変更] フォールバックを英語に変更
            const content = (summaryData && summaryData.html) ? summaryData.html : '<p>Summary not found.</p>';

            // 3. Reflect in UI
            summaryRole.textContent = role;
            summaryContentContainer.innerHTML = content;

            // 4. Show summary
            summaryModal.classList.remove('hidden');

        } catch (error) {
            console.error("Failed to get data for summary:", error);
            // [変更] エラーメッセージを英語に変更
            summaryRole.textContent = "Error";
            summaryContentContainer.innerHTML = "<p>Failed to load data.</p>";
            summaryModal.classList.remove('hidden');
        }
    });

    // (Summary close button unchanged)
    summaryCloseButton.addEventListener('click', () => {
        summaryModal.classList.add('hidden');
    });


    // --- Start Application ---
    document.addEventListener('DOMContentLoaded', initializeApp);

</script>

</body>
