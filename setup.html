<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebUI Loader Setup - 初期設定</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            overflow: hidden;
        }
        .glow-input:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="w-[1400px] h-[240px] flex items-center justify-between p-8 text-white relative">
    
    <!-- Decorative background glow -->
    <div class="absolute top-[-50px] left-[10%] w-[300px] h-[300px] bg-blue-600/10 rounded-full blur-[80px] pointer-events-none"></div>
    <div class="absolute bottom-[-50px] right-[10%] w-[300px] h-[300px] bg-emerald-600/10 rounded-full blur-[80px] pointer-events-none"></div>

    <!-- Left side: Title & Logo -->
    <div class="flex flex-col space-y-1 w-[320px] z-10">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-emerald-500 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">WebUI Loader</h1>
        </div>
        <p class="text-xs text-slate-400 font-medium">Initial Configuration / 初期システム設定</p>
        <p class="text-[10px] text-slate-500 pt-2 leading-relaxed">
            Please specify the target dashboard endpoint (local HTML file or remote web service URL).<br>
            ダッシュボードのエンドポイントを指定してください（ローカルHTMLファイルまたはリモートWebサービスURL）。
        </p>
    </div>

    <!-- Center side: Input form -->
    <div class="flex-grow max-w-[650px] mx-8 flex flex-col space-y-2 z-10">
        <label for="urlInput" class="text-xs font-semibold text-slate-300 tracking-wider uppercase">Dashboard URL or File Path / ダッシュボードのURLまたはファイルパス</label>
        <div class="relative flex items-center">
            <input type="text" id="urlInput" 
                   class="w-full px-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-all duration-300 glow-input"
                   placeholder="e.g. http://localhost:8080 or index.html"
                   value="http://localhost:8080">
        </div>
        <div id="errorText" class="text-xs text-rose-500 font-medium opacity-0 transition-opacity duration-300">
            Please enter a valid URL or local file name. / 有効なURLまたはファイル名を入力してください。
        </div>
    </div>

    <!-- Right side: Save Button -->
    <div class="flex flex-col justify-center items-end w-[220px] z-10">
        <button id="saveButton" 
                class="w-full py-3.5 px-6 bg-gradient-to-r from-blue-600 to-emerald-500 hover:from-blue-500 hover:to-emerald-400 text-sm font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-blue-500/20 hover:shadow-blue-500/35 transform hover:-translate-y-[1px] active:translate-y-[1px]">
            Save & Launch / 保存して起動
        </button>
        <p class="text-[10px] text-slate-500 mt-2 text-right w-full">
            Saved to / 保存先: <code class="text-slate-400 px-1 bg-slate-900 rounded border border-slate-800">settings.json</code>.
        </p>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const saveButton = document.getElementById('saveButton');
        const errorText = document.getElementById('errorText');

        saveButton.addEventListener('click', () => {
            const urlValue = urlInput.value.trim();
            if (!urlValue) {
                showError("Configuration URL cannot be empty. / 設定URLを入力してください。");
                return;
            }

            // Post the message back to C# WPF
            const message = {
                action: "saveSettings",
                dashboardUrl: urlValue
            };

            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(JSON.stringify(message));
            } else {
                showError("WebView2 host environment not detected. / WebView2ホスト環境が検出されませんでした。");
            }
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorText.style.opacity = 1;
            setTimeout(() => {
                errorText.style.opacity = 0;
            }, 4000);
        }

        // Allow pressing Enter in the input box
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                saveButton.click();
            }
        });
    </script>
</body>
</html>
